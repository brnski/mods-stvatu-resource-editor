name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from mod
        id: ver
        run: |
          VERSION=$(grep -m1 "ResourceEditor v" ResourceEditor/Scripts/main.lua | grep -oP 'v[0-9.]+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package mod
        run: zip -r ResourceEditor-${{ steps.ver.outputs.version }}.zip ResourceEditor/ UE4SS_Signatures/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ResourceEditor ${{ steps.ver.outputs.version }}
          files: ResourceEditor-${{ steps.ver.outputs.version }}.zip
          make_latest: true

      # ── Nexus Mods upload ────────────────────────────────────────────────────
      # Requires NEXUS_API_KEY secret and NEXUS_GAME_DOMAIN / NEXUS_MOD_ID vars.
      # Uses the official Nexus-Mods/upload-action which handles the full
      # upload session → S3 → finalise → publish flow.

      - name: Read README for description
        id: readme
        run: |
          {
            echo "content<<EOF"
            cat README.md
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Get Nexus mod UUID
        id: nexus_mod
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: |
          RESPONSE=$(curl -s "https://api.nexusmods.com/v3/games/${{ vars.NEXUS_GAME_DOMAIN }}/mods/${{ vars.NEXUS_MOD_ID }}" \
            -H "apikey: $NEXUS_API_KEY")
          echo "Response: $RESPONSE"
          MOD_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "mod_id=$MOD_ID" >> $GITHUB_OUTPUT

      - name: Get Nexus file update group
        id: nexus_group
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: |
          MOD_ID="${{ steps.nexus_mod.outputs.mod_id }}"
          RESPONSE=$(curl -s "https://api.nexusmods.com/v3/mods/$MOD_ID/file-update-groups" \
            -H "apikey: $NEXUS_API_KEY")
          echo "Response: $RESPONSE"
          GROUP_ID=$(echo "$RESPONSE" | jq -r 'if type == "array" and length > 0 then .[0].id else "" end')
          echo "group_id=$GROUP_ID" >> $GITHUB_OUTPUT

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.2
        with:
          api_key: ${{ secrets.NEXUS_API_KEY }}
          file_group_id: ${{ steps.nexus_group.outputs.group_id }}
          filename: ResourceEditor-${{ steps.ver.outputs.version }}.zip
          version: ${{ steps.ver.outputs.version }}
          display_name: ResourceEditor ${{ steps.ver.outputs.version }}
          description: ${{ steps.readme.outputs.content }}
          file_category: main
